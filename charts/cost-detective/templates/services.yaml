apiVersion: v1
kind: Service
metadata:
  name: cd-api
  namespace: {{ include "cd.namespace" . }}
spec:
  selector: { app: cd-api }
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: cd-web
  namespace: {{ include "cd.namespace" . }}
spec:
  selector: { app: cd-web }
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: cd-burner
  namespace: {{ include "cd.namespace" . }}
spec:
  selector: { app: cd-burner }
  ports:
    - name: http
      port: 8080
      targetPort: 8000
